---
# Secret holding database credentials.
# Replace the base64-encoded values with your own credentials:
#   echo -n 'airflow' | base64
apiVersion: v1
kind: Secret
metadata:
  name: airflow-postgres-secret
  namespace: airflow
  labels:
    app.kubernetes.io/part-of: airflow
type: Opaque
data:
  # "airflow" base64-encoded
  POSTGRES_USER: YWlyZmxvdw==
  POSTGRES_PASSWORD: YWlyZmxvdw==

---
# Secret holding the Fernet key and Flask secret key.
# Generate values:
#   python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
#   python -c "import secrets; print(secrets.token_hex(16))"
apiVersion: v1
kind: Secret
metadata:
  name: airflow-secret
  namespace: airflow
  labels:
    app.kubernetes.io/part-of: airflow
type: Opaque
stringData:
  # Replace with a real generated key before deploying to production.
  # Deployment will fail at runtime if these placeholders are left unchanged.
  AIRFLOW__CORE__FERNET_KEY: "CHANGEME_REPLACE_WITH_GENERATED_FERNET_KEY"
  AIRFLOW__WEBSERVER__SECRET_KEY: "CHANGEME_REPLACE_WITH_GENERATED_SECRET_KEY"
